---
- name: Set remote collector name from spoke-two cluster name
  ansible.builtin.set_fact:
    remote_collector_name: "otel-remote-{{ clusters.spoke_two.name }}"

- name: Apply Tempo operator on spoke
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ clusters.spoke.kubeconfig }}"
    definition:
      apiVersion: operators.coreos.com/v1alpha1
      kind: Subscription
      metadata:
        name: tempo-product
        namespace: openshift-operators
      spec:
        channel: stable
        installPlanApproval: Automatic
        name: tempo-product
        source: redhat-operators
        sourceNamespace: openshift-marketplace

- name: Apply OpenTelemetry operator on both spokes
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ item }}"
    definition:
      apiVersion: operators.coreos.com/v1alpha1
      kind: Subscription
      metadata:
        name: opentelemetry-product
        namespace: openshift-operators
      spec:
        channel: stable
        installPlanApproval: Automatic
        name: opentelemetry-product
        source: redhat-operators
        sourceNamespace: openshift-marketplace
  loop:
    - "{{ clusters.spoke.kubeconfig }}"
    - "{{ clusters.spoke_two.kubeconfig }}"

- name: Wait for TempoStack CRD
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: tempostacks.tempo.grafana.com
    kubeconfig: "{{ clusters.spoke.kubeconfig }}"
  register: tempo_crd
  until: tempo_crd.resources | length > 0
  retries: "{{ wait_retries }}"
  delay: "{{ wait_delay }}"

- name: Wait for OpenTelemetryCollector CRD on both spokes
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: opentelemetrycollectors.opentelemetry.io
    kubeconfig: "{{ item }}"
  register: otel_crd
  until: otel_crd.resources | length > 0
  retries: "{{ wait_retries }}"
  delay: "{{ wait_delay }}"
  loop:
    - "{{ clusters.spoke.kubeconfig }}"
    - "{{ clusters.spoke_two.kubeconfig }}"

- name: Ensure tempo namespace
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ clusters.spoke.kubeconfig }}"
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ tempo_namespace }}"

- name: Deploy MinIO for Tempo
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ clusters.spoke.kubeconfig }}"
    definition: "{{ lookup('template', 'minio.yml.j2') | from_yaml_all | list }}"

- name: Wait for Tempo MinIO
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    name: minio
    namespace: "{{ tempo_namespace }}"
    kubeconfig: "{{ clusters.spoke.kubeconfig }}"
    wait: true
    wait_condition:
      type: Available
      status: "True"
    wait_timeout: 300

- name: Apply Tempo MinIO secret
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ clusters.spoke.kubeconfig }}"
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: tempostack-dev-minio
        namespace: "{{ tempo_namespace }}"
      type: Opaque
      stringData:
        bucket: tempo-data
        endpoint: "http://minio.{{ tempo_namespace }}.svc.cluster.local:9000"
        access_key_id: "{{ minio_access_key }}"
        access_key_secret: "{{ minio_secret_key }}"

- name: Apply TempoStack
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ clusters.spoke.kubeconfig }}"
    definition: "{{ lookup('template', 'tempostack.yml.j2') | from_yaml }}"

- name: Wait for Tempo gateway Service
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Service
    name: "tempo-{{ tempo_stack_name }}-gateway"
    namespace: "{{ tempo_namespace }}"
    kubeconfig: "{{ clusters.spoke.kubeconfig }}"
  register: tempo_gw
  until: tempo_gw.resources | length > 0
  retries: 60
  delay: 10

- name: Apply Tempo write RBAC
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ clusters.spoke.kubeconfig }}"
    definition: "{{ lookup('template', 'rbac-write.yml.j2') | from_yaml_all | list }}"

- name: Apply Tempo read RBAC
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ clusters.spoke.kubeconfig }}"
    definition: "{{ lookup('template', 'rbac-read.yml.j2') | from_yaml_all | list }}"

- name: Apply local OTEL collector on spoke
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ clusters.spoke.kubeconfig }}"
    definition: "{{ lookup('template', 'otel-local.yml.j2') | from_yaml }}"

- name: Apply remote OTEL receiver on spoke
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ clusters.spoke.kubeconfig }}"
    definition: "{{ lookup('template', 'otel-remote.yml.j2') | from_yaml }}"

- name: Apply passthrough Route for remote OTEL
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ clusters.spoke.kubeconfig }}"
    definition:
      apiVersion: route.openshift.io/v1
      kind: Route
      metadata:
        name: "{{ remote_collector_name }}"
        namespace: "{{ mesh_namespace }}"
      spec:
        to:
          kind: Service
          name: "{{ remote_collector_name }}-collector"
          weight: 100
        port:
          targetPort: otlp-http
        tls:
          termination: passthrough
        wildcardPolicy: None

- name: Wait for remote Route host (discovered at runtime)
  kubernetes.core.k8s_info:
    api_version: route.openshift.io/v1
    kind: Route
    name: "{{ remote_collector_name }}"
    namespace: "{{ mesh_namespace }}"
    kubeconfig: "{{ clusters.spoke.kubeconfig }}"
  register: otel_route
  until: >
    otel_route.resources | length > 0 and
    (otel_route.resources[0].spec.host | default('') | length) > 0
  retries: 36
  delay: 5

- name: Set remote_route_host fact
  ansible.builtin.set_fact:
    remote_route_host: "{{ otel_route.resources[0].spec.host }}"

- name: Generate OTEL mTLS certs (gitignored dir)
  ansible.builtin.shell: |
    set -euo pipefail
    OTEL_CERT_DIR="{{ otel_mtls_dir }}"
    mkdir -p "${OTEL_CERT_DIR}"
    REMOTE_COLLECTOR_NAME="{{ remote_collector_name }}"
    REMOTE_ROUTE_HOST="{{ remote_route_host }}"

    openssl req -x509 -newkey ec -pkeyopt ec_paramgen_curve:P-256 \
      -days 3650 -nodes \
      -keyout "${OTEL_CERT_DIR}/ca.key" \
      -out "${OTEL_CERT_DIR}/ca.crt" \
      -subj "/CN=${REMOTE_COLLECTOR_NAME}-ca" 2>/dev/null

    openssl req -newkey ec -pkeyopt ec_paramgen_curve:P-256 -nodes \
      -keyout "${OTEL_CERT_DIR}/server.key" \
      -out "${OTEL_CERT_DIR}/server.csr" \
      -subj "/CN=${REMOTE_COLLECTOR_NAME}-server" 2>/dev/null

    printf "subjectAltName=DNS:%s,DNS:%s.istio-system.svc,DNS:%s.istio-system.svc.cluster.local,DNS:%s" \
      "${REMOTE_COLLECTOR_NAME}-collector" \
      "${REMOTE_COLLECTOR_NAME}-collector" \
      "${REMOTE_COLLECTOR_NAME}-collector" \
      "${REMOTE_ROUTE_HOST}" > "${OTEL_CERT_DIR}/server-ext.cnf"

    openssl x509 -req -days 3650 \
      -in "${OTEL_CERT_DIR}/server.csr" \
      -CA "${OTEL_CERT_DIR}/ca.crt" \
      -CAkey "${OTEL_CERT_DIR}/ca.key" -CAcreateserial \
      -extfile "${OTEL_CERT_DIR}/server-ext.cnf" \
      -out "${OTEL_CERT_DIR}/server.crt" 2>/dev/null

    openssl req -newkey ec -pkeyopt ec_paramgen_curve:P-256 -nodes \
      -keyout "${OTEL_CERT_DIR}/client.key" \
      -out "${OTEL_CERT_DIR}/client.csr" \
      -subj "/CN=${REMOTE_COLLECTOR_NAME}-client" 2>/dev/null

    openssl x509 -req -days 3650 \
      -in "${OTEL_CERT_DIR}/client.csr" \
      -CA "${OTEL_CERT_DIR}/ca.crt" \
      -CAkey "${OTEL_CERT_DIR}/ca.key" -CAcreateserial \
      -out "${OTEL_CERT_DIR}/client.crt" 2>/dev/null
  args:
    executable: /bin/bash
    creates: "{{ otel_mtls_dir }}/server.crt"

- name: Apply OTEL mTLS secrets on spoke
  ansible.builtin.shell: |
    set -euo pipefail
    D="{{ otel_mtls_dir }}"
    N="{{ remote_collector_name }}"
    KC="{{ clusters.spoke.kubeconfig }}"
    oc --kubeconfig="$KC" create secret generic "${N}-ca" -n {{ mesh_namespace }} \
      --from-file=tls.crt="$D/ca.crt" --from-file=tls.key="$D/ca.key" \
      --dry-run=client -o yaml | oc --kubeconfig="$KC" apply -f -
    oc --kubeconfig="$KC" create secret tls "${N}-server-tls" -n {{ mesh_namespace }} \
      --cert="$D/server.crt" --key="$D/server.key" \
      --dry-run=client -o yaml | oc --kubeconfig="$KC" apply -f -
    oc --kubeconfig="$KC" create secret tls "${N}-client-tls" -n {{ mesh_namespace }} \
      --cert="$D/client.crt" --key="$D/client.key" \
      --dry-run=client -o yaml | oc --kubeconfig="$KC" apply -f -
  args:
    executable: /bin/bash
  no_log: true

- name: Restart remote OTEL receiver after certs
  ansible.builtin.command: >
    oc --kubeconfig={{ clusters.spoke.kubeconfig }}
    rollout restart deployment/{{ remote_collector_name }}-collector
    -n {{ mesh_namespace }}
  failed_when: false

- name: Sync client bundle to spoke-two
  ansible.builtin.shell: |
    set -euo pipefail
    N="{{ remote_collector_name }}"
    KC1="{{ clusters.spoke.kubeconfig }}"
    KC2="{{ clusters.spoke_two.kubeconfig }}"
    CA=$(oc --kubeconfig="$KC1" get secret "${N}-ca" -n {{ mesh_namespace }} -o jsonpath='{.data.tls\.crt}' | base64 -d)
    CRT=$(oc --kubeconfig="$KC1" get secret "${N}-client-tls" -n {{ mesh_namespace }} -o jsonpath='{.data.tls\.crt}' | base64 -d)
    KEY=$(oc --kubeconfig="$KC1" get secret "${N}-client-tls" -n {{ mesh_namespace }} -o jsonpath='{.data.tls\.key}' | base64 -d)
    oc --kubeconfig="$KC2" create secret generic "${N}-client-bundle" -n {{ mesh_namespace }} \
      --from-literal=ca.crt="$CA" --from-literal=tls.crt="$CRT" --from-literal=tls.key="$KEY" \
      --dry-run=client -o yaml | oc --kubeconfig="$KC2" apply -f -
  args:
    executable: /bin/bash
  no_log: true

- name: Apply OTEL forwarder on spoke-two
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ clusters.spoke_two.kubeconfig }}"
    definition: "{{ lookup('template', 'otel-forwarder.yml.j2') | from_yaml }}"

- name: Patch Istio enableTracing on both spokes
  ansible.builtin.command: >
    oc --kubeconfig={{ item }}
    patch istio default --type=merge -p
    {"spec":{"values":{"meshConfig":{"enableTracing":true,"extensionProviders":[{"name":"otel-tracing","opentelemetry":{"service":"otel-collector.istio-system.svc.cluster.local","port":4317}}]}}}}
  loop:
    - "{{ clusters.spoke.kubeconfig }}"
    - "{{ clusters.spoke_two.kubeconfig }}"

- name: Apply mesh Telemetry on both spokes
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ item }}"
    definition: "{{ lookup('template', 'telemetry.yml.j2') | from_yaml }}"
  vars:
    telemetry_name: otel-tracing
    telemetry_namespace: "{{ mesh_namespace }}"
  loop:
    - "{{ clusters.spoke.kubeconfig }}"
    - "{{ clusters.spoke_two.kubeconfig }}"

- name: Apply per-namespace Telemetry for demos
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ item.0 }}"
    definition: "{{ lookup('template', 'telemetry.yml.j2') | from_yaml }}"
  vars:
    telemetry_name: "{{ item.1 }}-tracing"
    telemetry_namespace: "{{ item.1 }}"
  loop: "{{ [clusters.spoke.kubeconfig, clusters.spoke_two.kubeconfig] | product(['ambient-demo', 'bookinfo']) | list }}"
  failed_when: false

- name: Apply distributed-tracing UIPlugin
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ clusters.spoke.kubeconfig }}"
    definition:
      apiVersion: observability.openshift.io/v1alpha1
      kind: UIPlugin
      metadata:
        name: distributed-tracing
      spec:
        type: DistributedTracing

- name: Discover console URL for Kiali tracing patch
  kubernetes.core.k8s_info:
    api_version: route.openshift.io/v1
    kind: Route
    name: console
    namespace: openshift-console
    kubeconfig: "{{ clusters.spoke.kubeconfig }}"
  register: console_route

- name: Merge-safe Kiali tracing patch
  ansible.builtin.shell: |
    set -euo pipefail
    CONSOLE_URL="https://{{ console_route.resources[0].spec.host }}"
    oc --kubeconfig={{ clusters.spoke.kubeconfig }} get kiali kiali -n {{ kiali_cr_ns }} -o json \
    | jq \
      --arg url "$CONSOLE_URL" \
      --arg stack "{{ tempo_stack_name }}" \
      --arg ns "{{ tempo_namespace }}" \
      --arg tenant "{{ tempo_tenant }}" '
      .spec.external_services.tracing = {
        "enabled": true,
        "provider": "tempo",
        "use_grpc": false,
        "internal_url": ("https://tempo-" + $stack + "-gateway." + $ns + ".svc.cluster.local:8080/"),
        "external_url": $url,
        "auth": {"type": "bearer", "use_kiali_token": true},
        "tempo_config": {
          "name": $stack,
          "namespace": $ns,
          "tenant": $tenant,
          "org_id": $tenant,
          "url_format": "openshift"
        }
      }
    ' | oc --kubeconfig={{ clusters.spoke.kubeconfig }} apply -f -
  args:
    executable: /bin/bash
