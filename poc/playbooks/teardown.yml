---
# Cleanup opcional — NÃO roda em site.yml.
# Remove demos, mesh CRs e recursos de observabilidade nos spokes.
# ACM no hub é preservado por padrão (teardown_acm=false).

- name: Teardown OSSM ACM multi-cluster resources
  hosts: localhost
  gather_facts: false
  vars:
    teardown_acm: false
    confirm_teardown: false
  pre_tasks:
    - name: Require explicit confirmation
      ansible.builtin.assert:
        that: confirm_teardown | bool
        fail_msg: >-
          Passe -e confirm_teardown=true para apagar recursos.
          Ex.: ansible-playbook playbooks/teardown.yml -e confirm_teardown=true

    - name: Bootstrap
      ansible.builtin.include_role:
        name: bootstrap
      vars:
        require_spoke_two: true
        require_istioctl: false

  tasks:
    - name: Delete demo namespaces on both spokes
      kubernetes.core.k8s:
        state: absent
        kubeconfig: "{{ item.0 }}"
        kind: Namespace
        name: "{{ item.1 }}"
      loop: "{{ [clusters.spoke.kubeconfig, clusters.spoke_two.kubeconfig] | product(['ambient-demo', 'bookinfo', 'perses', 'tempo']) | list }}"
      failed_when: false

    - name: Delete Istio / ZTunnel / IstioCNI on both spokes
      kubernetes.core.k8s:
        state: absent
        kubeconfig: "{{ item.0 }}"
        api_version: sailoperator.io/v1
        kind: "{{ item.1 }}"
        name: default
      loop: "{{ [clusters.spoke.kubeconfig, clusters.spoke_two.kubeconfig] | product(['Istio', 'ZTunnel', 'IstioCNI']) | list }}"
      failed_when: false

    - name: Delete Kiali CRs
      kubernetes.core.k8s:
        state: absent
        kubeconfig: "{{ item }}"
        api_version: kiali.io/v1alpha1
        kind: Kiali
        name: kiali
        namespace: "{{ kiali_cr_ns }}"
      loop:
        - "{{ clusters.spoke.kubeconfig }}"
        - "{{ clusters.spoke_two.kubeconfig }}"
      failed_when: false

    - name: Delete MultiClusterObservability when requested
      when: teardown_acm | bool
      kubernetes.core.k8s:
        state: absent
        kubeconfig: "{{ clusters.hub.kubeconfig }}"
        api_version: observability.open-cluster-management.io/v1beta2
        kind: MultiClusterObservability
        name: observability
      failed_when: false

    - name: Reminder
      ansible.builtin.debug:
        msg: >-
          Teardown parcial concluído. Operadores OLM e ManagedClusters podem
          permanecer. Use teardown_acm=true para remover MCO. Certificados
          locais em files/certs/ não são apagados automaticamente.
