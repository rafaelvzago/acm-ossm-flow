      ansible.builtin.include_role:
        name: bootstrap
      vars:
        require_spoke_two: false
        require_istioctl: false

  tasks:
    - name: Kiali health metrics + hub Thanos Ruler
      ansible.builtin.include_role:
        name: health_alerts
      tags: [health]
