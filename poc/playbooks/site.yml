---
- name: OSSM 2.6 Multi-Primary Multi-Cluster Setup
  hosts: localhost
  gather_facts: false

  pre_tasks:
    - name: Validate cluster auth environment variables
      ansible.builtin.assert:
        that:
          - lookup('env', 'KUBECONFIG_WEST') | length > 0
          - lookup('env', 'KUBECONFIG_EAST') | length > 0
        fail_msg: >-
          Set KUBECONFIG_WEST and KUBECONFIG_EAST environment variables
          pointing to kubeconfig files. See .env.example for details.

    - name: Verify cluster connectivity
      kubernetes.core.k8s_info:
        kind: Namespace
        name: default
        kubeconfig: "{{ item.value.kubeconfig }}"
      loop: "{{ clusters | dict2items }}"
      loop_control:
        label: "{{ item.key }}"

    - name: Check ServiceMesh operator is installed
      kubernetes.core.k8s_info:
        api_version: operators.coreos.com/v1alpha1
        kind: Subscription
        namespace: openshift-operators
        kubeconfig: "{{ item.value.kubeconfig }}"
        label_selectors:
          - "operators.coreos.com/servicemeshoperator.openshift-operators"
      register: sm_operator
      failed_when: sm_operator.resources | length == 0
      loop: "{{ clusters | dict2items }}"
      loop_control:
        label: "{{ item.key }}"

  tasks:
    - name: "Phase 1: Generate certificates"
      ansible.builtin.include_role:
        name: certificates

    - name: "Phase 2: Deploy mesh control plane"
      ansible.builtin.include_role:
        name: mesh-control-plane

    - name: "Phase 3: Deploy east-west gateways"
      ansible.builtin.include_role:
        name: eastwest-gateway

    - name: "Phase 4: Create remote secrets"
      ansible.builtin.include_role:
        name: remote-secrets

    - name: "Phase 5a: Deploy initial demo apps"
      ansible.builtin.include_role:
        name: demo-apps
      vars:
        deploy_phase: initial

    - name: "Phase 5b: Update mesh networks with real gateway addresses"
      ansible.builtin.include_role:
        name: mesh-networks

    - name: "Phase 5c: Deploy remaining demo apps"
      ansible.builtin.include_role:
        name: demo-apps
      vars:
        deploy_phase: full

    - name: "Phase 6: Verify cross-cluster connectivity"
      ansible.builtin.include_role:
        name: verify
