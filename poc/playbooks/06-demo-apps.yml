---
- name: "Phase 6: Demo Application Deployment"
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Deploy initial apps (bookinfo on west, sleep on east)
      ansible.builtin.include_role:
        name: demo-apps
      vars:
        deploy_phase: initial

    - name: Deploy bookinfo on east cluster
      ansible.builtin.include_role:
        name: demo-apps
      vars:
        deploy_phase: full
