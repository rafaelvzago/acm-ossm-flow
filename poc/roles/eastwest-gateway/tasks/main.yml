---
- name: Deploy east-west gateway on each cluster
  ansible.builtin.include_tasks: per-cluster.yml
  loop: "{{ clusters | dict2items }}"
  loop_control:
    loop_var: cluster_entry
    label: "{{ cluster_entry.key }}"
  vars:
    cluster: "{{ cluster_entry.value }}"
    cluster_key: "{{ cluster_entry.key }}"
