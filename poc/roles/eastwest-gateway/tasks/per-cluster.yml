---
- name: "Apply east-west gateway resources on {{ cluster_key }}"
  kubernetes.core.k8s:
    state: present
    definition: "{{ item }}"
    kubeconfig: "{{ cluster.kubeconfig }}"
  loop: >-
    {{ lookup('template', 'eastwest-gateway.yml.j2')
       | from_yaml_all | list }}
  loop_control:
    label: "{{ item.kind }}/{{ item.metadata.name }}"

- name: "Wait for east-west gateway deployment on {{ cluster_key }}"
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    name: istio-eastwestgateway
    namespace: "{{ mesh_namespace }}"
    kubeconfig: "{{ cluster.kubeconfig }}"
  register: _gw_deploy
  until: >-
    _gw_deploy.resources | length > 0 and
    (_gw_deploy.resources[0].status.availableReplicas
     | default(0)) >= 1
  retries: "{{ lb_wait_retries }}"
  delay: "{{ lb_wait_delay }}"

- name: "Wait for LoadBalancer address on {{ cluster_key }}"
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Service
    name: istio-eastwestgateway
    namespace: "{{ mesh_namespace }}"
    kubeconfig: "{{ cluster.kubeconfig }}"
  register: eastwest_gateway_svc
  until: >-
    eastwest_gateway_svc.resources | length > 0 and
    eastwest_gateway_svc.resources[0].status.loadBalancer.ingress is defined and
    eastwest_gateway_svc.resources[0].status.loadBalancer.ingress | length > 0
  retries: "{{ lb_wait_retries }}"
  delay: "{{ lb_wait_delay }}"
