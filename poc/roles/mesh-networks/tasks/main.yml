---
- name: Get gateway LoadBalancer address per cluster
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Service
    name: istio-eastwestgateway
    namespace: "{{ mesh_namespace }}"
    kubeconfig: "{{ item.value.kubeconfig }}"
  register: gw_svcs
  until: >-
    gw_svcs.resources | length > 0 and
    gw_svcs.resources[0].status.loadBalancer.ingress is defined and
    gw_svcs.resources[0].status.loadBalancer.ingress | length > 0
  retries: "{{ lb_wait_retries }}"
  delay: "{{ lb_wait_delay }}"
  loop: "{{ clusters | dict2items }}"
  loop_control:
    label: "{{ item.key }}"

- name: Set gateway addresses
  ansible.builtin.set_fact:
    west_gateway_address: >-
      {{ (gw_svcs.results | selectattr('item.key', 'equalto', 'west') | first)
         .resources[0].status.loadBalancer.ingress[0].hostname
         | default((gw_svcs.results | selectattr('item.key', 'equalto', 'west') | first)
         .resources[0].status.loadBalancer.ingress[0].ip) }}
    east_gateway_address: >-
      {{ (gw_svcs.results | selectattr('item.key', 'equalto', 'east') | first)
         .resources[0].status.loadBalancer.ingress[0].hostname
         | default((gw_svcs.results | selectattr('item.key', 'equalto', 'east') | first)
         .resources[0].status.loadBalancer.ingress[0].ip) }}

- name: Display gateway addresses
  ansible.builtin.debug:
    msg:
      - "West gateway: {{ west_gateway_address }}"
      - "East gateway: {{ east_gateway_address }}"

- name: Update SMCP with remote gateway address
  kubernetes.core.k8s:
    state: present
    definition: >-
      {{ lookup('template',
         '../mesh-control-plane/templates/smcp.yml.j2')
         | from_yaml }}
    kubeconfig: "{{ item.local.kubeconfig }}"
  vars:
    cluster: "{{ item.local }}"
    remote_network: "{{ item.remote.network }}"
    remote_cluster: "{{ item.remote.name }}"
    remote_gateway_address: "{{ item.remote_gateway }}"
  loop:
    - local: "{{ clusters.east }}"
      remote: "{{ clusters.west }}"
      remote_gateway: "{{ west_gateway_address }}"
    - local: "{{ clusters.west }}"
      remote: "{{ clusters.east }}"
      remote_gateway: "{{ east_gateway_address }}"
  loop_control:
    label: "{{ item.local.name }} <- {{ item.remote.name }}"

- name: Wait for SMCP to reconcile on both clusters
  kubernetes.core.k8s_info:
    api_version: maistra.io/v2
    kind: ServiceMeshControlPlane
    name: "{{ smcp_name }}"
    namespace: "{{ mesh_namespace }}"
    kubeconfig: "{{ item.value.kubeconfig }}"
  register: _smcp
  until: >-
    _smcp.resources | length > 0 and
    _smcp.resources[0].status is defined and
    _smcp.resources[0].status.conditions is defined and
    _smcp.resources[0].status.conditions
    | selectattr('type', 'equalto', 'Ready')
    | selectattr('status', 'equalto', 'True')
    | list | length > 0
  retries: "{{ smcp_wait_retries }}"
  delay: "{{ smcp_wait_delay }}"
  loop: "{{ clusters | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
