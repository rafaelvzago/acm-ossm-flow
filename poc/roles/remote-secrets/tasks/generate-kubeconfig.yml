---
- name: "Extract API server URL from kubeconfig for {{ cluster_key }}"
  ansible.builtin.command:
    cmd: >-
      oc config view --kubeconfig={{ cluster.kubeconfig }}
      --minify -o jsonpath='{.clusters[0].cluster.server}'
  register: _server_url
  changed_when: false

- name: "Extract CA data from kubeconfig for {{ cluster_key }}"
  ansible.builtin.command:
    cmd: >-
      oc config view --kubeconfig={{ cluster.kubeconfig }}
      --minify --raw
      -o jsonpath='{.clusters[0].cluster.certificate-authority-data}'
  register: _ca_data
  changed_when: false

- name: "Generate istio-reader-service-account token for {{ cluster_key }}"
  ansible.builtin.command:
    cmd: >-
      oc create token istio-reader-service-account
      -n {{ mesh_namespace }}
      --duration={{ token_duration }}
      --kubeconfig={{ cluster.kubeconfig }}
  register: _sa_token
  changed_when: false

- name: "Template reader kubeconfig for {{ cluster_key }}"
  ansible.builtin.set_fact:
    "_reader_kubeconfig_{{ cluster_key }}": >-
      {{ lookup('template', 'reader-kubeconfig.yml.j2') }}
  vars:
    cluster_name: "{{ cluster.name }}"
    server_url: "{{ _server_url.stdout }}"
    ca_data: "{{ _ca_data.stdout }}"
    sa_token: "{{ _sa_token.stdout }}"
