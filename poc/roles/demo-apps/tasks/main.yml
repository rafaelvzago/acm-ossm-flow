---
# Phase "initial": bookinfo on west, sleep on east
# Phase "full": bookinfo on east too

- name: Deploy bookinfo on west cluster
  ansible.builtin.include_tasks: deploy-app.yml
  vars:
    cluster: "{{ clusters.west }}"
    cluster_key: west
    app_namespace: "{{ bookinfo_namespace }}"
    manifest_url: "{{ bookinfo_manifest_url }}"
    app_name: bookinfo
  when: deploy_phase == 'initial'

- name: Deploy sleep on east cluster
  ansible.builtin.include_tasks: deploy-app.yml
  vars:
    cluster: "{{ clusters.east }}"
    cluster_key: east
    app_namespace: "{{ sleep_namespace }}"
    manifest_url: "{{ sleep_manifest_url }}"
    app_name: sleep
  when: deploy_phase == 'initial'

- name: Deploy bookinfo on east cluster
  ansible.builtin.include_tasks: deploy-app.yml
  vars:
    cluster: "{{ clusters.east }}"
    cluster_key: east
    app_namespace: "{{ bookinfo_namespace }}"
    manifest_url: "{{ bookinfo_manifest_url }}"
    app_name: bookinfo
  when: deploy_phase == 'full'
